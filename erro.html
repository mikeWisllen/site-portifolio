<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- bootstrapicons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="thank.css">
    <title>Erro no Envio</title>
    <style>
        .btn-voltar {
            margin-top: 20px;
        }
        .btn-voltar button {
            padding: 10px 40px;
            font-size: 18px;
            font-weight: 600;
            background-color: #765898;
            border: 0;
            border-radius: 30px;
            cursor: pointer;
            color: #000;
            transition: .2s;
        }
        .btn-voltar button:hover {
            box-shadow: 0px 0px 8px #765898;
            transform: scale(1.05);
        }
        .txt-topo-do-site h1 span {
            color: #ff4d4d; /* Cor vermelha para erro */
        }
    </style>
</head>
<body>
    <header>
        <div class="interface">
            <div class="logo">
                <a href="index.html"><img src="images/logo2.jpg" alt="Logo Mike"></a>
            </div>
        </div>
    </header>

    <main>
        <section class="topo-do-site">
            <div class="interface">
                <div class="flex">
                    <div class="txt-topo-do-site">
                        <h1>Ops! Ocorreu um erro ao enviar sua mensagem<span>.</span></h1>
                        <p>Por favor, tente novamente mais tarde ou entre em contato diretamente por e-mail.</p>
                        <div class="btn-voltar">
                            <a href="index.html">
                                <button>Voltar ao Início</button>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
